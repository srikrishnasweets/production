<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Scheduling Tool</title>
    <!-- Include SheetJS (xlsx) for Excel processing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* Vanilla CSS - Premium, Modern, Glassmorphism */
        :root {
            --bg-color: #0f172a;
            /* Slate 900 */
            --card-bg: rgba(30, 41, 59, 0.7);
            /* Slate 800 with opacity */
            --primary: #3b82f6;
            /* Blue 500 */
            --primary-hover: #2563eb;
            /* Blue 600 */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 1.85rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 1rem;
        }

        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
        }

        .tab-btn {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            padding: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            padding: 50px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 30px;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-area svg {
            width: 54px;
            height: 54px;
            color: var(--primary);
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }

        .upload-area:hover svg {
            transform: translateY(-5px);
        }

        .upload-area input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-name {
            margin-top: 15px;
            font-size: 0.95rem;
            color: #60a5fa;
            word-break: break-all;
            display: none;
            font-weight: 500;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: var(--primary);
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
            opacity: 0.5;
            pointer-events: none;
        }

        .btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .btn.active:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(59, 130, 246, 0.5);
        }

        .btn.active:active {
            transform: translateY(0);
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }


        /* Spinner animation */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        .template-guide {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--border-color);
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: left;
        }

        .template-guide strong {
            color: #60a5fa;
        }

        .guide-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .guide-list {
            margin: 0;
            padding-left: 20px;
        }

        .guide-list li {
            margin-bottom: 6px;
        }

        .guide-list li:last-child {
            margin-bottom: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Production Scheduler</h1>
        <p class="subtitle">Time Scheduler and Tray Counter</p>

        <div class="tabs">
            <button class="tab-btn active" id="tabSchedulerBtn" type="button">Time Scheduler</button>
            <button class="tab-btn" id="tabTrayBtn" type="button">Tray Counter</button>
        </div>

        <div class="tab-panel active" id="schedulerPanel">
            <div class="upload-area" id="dropZone">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <div style="font-weight: 500; font-size: 1.1rem; margin-bottom: 6px;">Click or drag Excel file here
                </div>
                <div style="font-size: 0.85rem; color: var(--text-muted);">Supports .xlsx and .xls formats</div>
                <input type="file" id="fileInput" accept=".xlsx, .xls">
                <div class="file-name" id="fileName"></div>
            </div>

            <button class="btn" id="processBtn">
                Process & Download
            </button>

            <div class="loading" id="loadingStatus">
                <span class="spinner"></span> <span id="loadingText">Fetching product times...</span>
            </div>
        </div>

        <div class="tab-panel" id="trayPanel">
            <div class="upload-area" id="trayDropZone">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <div style="font-weight: 500; font-size: 1.1rem; margin-bottom: 6px;">Upload Tray Input Excel</div>
                <div style="font-size: 0.85rem; color: var(--text-muted);">Requires sheet named "tray"</div>
                <input type="file" id="trayFileInput" accept=".xlsx, .xls">
                <div class="file-name" id="trayFileName"></div>
            </div>

            <button class="btn" id="trayProcessBtn">Generate Tray Counter Excel</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxwbB41ulTO3-tV6nZ2LQL30dzqCTUhflx7wTvxZQQEkCtZztW_7Y8PKZrqEo4XkqV85g/exec";

        let selectedFile = null;
        let productAvgTimes = {};
        let productMasterMap = {};

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const fileNameDiv = document.getElementById('fileName');
        const processBtn = document.getElementById('processBtn');
        const loadingStatus = document.getElementById('loadingStatus');
        const loadingText = document.getElementById('loadingText');
        const tabSchedulerBtn = document.getElementById('tabSchedulerBtn');
        const tabTrayBtn = document.getElementById('tabTrayBtn');
        const schedulerPanel = document.getElementById('schedulerPanel');
        const trayPanel = document.getElementById('trayPanel');
        const trayFileInput = document.getElementById('trayFileInput');
        const trayDropZone = document.getElementById('trayDropZone');
        const trayFileName = document.getElementById('trayFileName');
        const trayProcessBtn = document.getElementById('trayProcessBtn');
        let traySelectedFile = null;

        // Fetch Avg Times on load using standard fetch GET request
        window.onload = async () => {
            loadingStatus.style.display = 'block';
            loadingText.innerText = 'Initializing... Fetching live Avg Times from Google Sheet';

            try {
                if (API_URL.includes("YOUR_URL_HERE")) {
                    alert("Please paste your Google Apps Script URL into the API_URL variable inside the schedule.html file!");
                    loadingText.innerText = 'API URL Missing.';
                    return;
                }

                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');

                const apiData = await response.json();

                // Extract avgTimes/setTime and master robustly
                productAvgTimes = {};
                productMasterMap = {};

                if (apiData && typeof apiData === 'object') {
                    const setTimeSource = apiData.setTime || apiData.avgTimes || apiData;
                    if (Array.isArray(setTimeSource)) {
                        // New array format
                        setTimeSource.forEach((item) => {
                            if (!item) return;
                            const productKey = normalizeProductKey(item.Product || item.product || item.PRODUCT);
                            if (productKey) {
                                const startMin = parseTimeToMinutes(item.Start || item.start);
                                const endMin = parseTimeToMinutes(item.End || item.end);
                                const diff = endMin - startMin;
                                productAvgTimes[productKey] = diff > 0 ? diff : 0;
                                const masterName = String(item.Master || item.master || item.MASTER || '').trim();
                                if (masterName) {
                                    productMasterMap[productKey] = masterName;
                                }
                            }
                        });
                    } else if (setTimeSource && typeof setTimeSource === 'object') {
                        // Old object key-value format fallback
                        Object.keys(setTimeSource).forEach((key) => {
                            productAvgTimes[normalizeProductKey(key)] = Number(setTimeSource[key]) || 0;
                        });
                    }
                }

                // Parse master array from MASTER sheet as fallback
                if (apiData && Array.isArray(apiData.master)) {
                    apiData.master.forEach((item) => {
                        if (!item) return;
                        let rawProduct = item.Product || item.product || item.PRODUCT;
                        let rawMaster = item.Master || item.master || item.MASTER;
                        if (rawProduct === undefined || rawMaster === undefined) {
                            for (const k of Object.keys(item)) {
                                if (k.toLowerCase() === 'product') rawProduct = item[k];
                                if (k.toLowerCase() === 'master') rawMaster = item[k];
                            }
                        }
                        const productKey = normalizeProductKey(rawProduct);
                        const masterName = String(rawMaster || '').trim();
                        if (productKey && masterName) {
                            // Only set if not already set by SETTIME sheet mapping
                            if (!productMasterMap[productKey]) {
                                productMasterMap[productKey] = masterName;
                            }
                        }
                    });
                }

                loadingStatus.style.display = 'none';
                if (selectedFile) {
                    processBtn.classList.add('active');
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                loadingText.innerText = 'Error loading Avg Times. Please check your API URL or internet connection.';
                loadingText.style.color = '#ef4444';
            }
        };

        tabSchedulerBtn.addEventListener('click', () => switchTab('scheduler'));
        tabTrayBtn.addEventListener('click', () => switchTab('tray'));

        function switchTab(tab) {
            const schedulerActive = tab === 'scheduler';
            tabSchedulerBtn.classList.toggle('active', schedulerActive);
            tabTrayBtn.classList.toggle('active', !schedulerActive);
            schedulerPanel.classList.toggle('active', schedulerActive);
            trayPanel.classList.toggle('active', !schedulerActive);
        }

        // File Selection Handlers
        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        function handleFileSelect(file) {
            if (!file) return;
            selectedFile = file;
            fileNameDiv.textContent = file.name;
            fileNameDiv.style.display = 'block';
            if (Object.keys(productAvgTimes).length > 0) {
                processBtn.classList.add('active');
            }
        }

        trayFileInput.addEventListener('change', (e) => handleTrayFileSelect(e.target.files[0]));
        trayDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            trayDropZone.classList.add('dragover');
        });
        trayDropZone.addEventListener('dragleave', () => trayDropZone.classList.remove('dragover'));
        trayDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            trayDropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleTrayFileSelect(e.dataTransfer.files[0]);
        });

        function handleTrayFileSelect(file) {
            if (!file) return;
            traySelectedFile = file;
            trayFileName.textContent = file.name;
            trayFileName.style.display = 'block';
            updateTrayButtonState();
        }

        function updateTrayButtonState() {
            const ready = !!traySelectedFile;
            trayProcessBtn.classList.toggle('active', ready);
        }

        processBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            processBtn.disabled = true;
            processBtn.innerHTML = '<span class="spinner"></span> Processing...';
            processBtn.style.opacity = '0.8';

            try {
                const data = await selectedFile.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                // Read sheet to JSON
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

                // Process logic
                const processedData = processSchedule(jsonData);

                // Convert processed data back to sheet
                const newWorksheet = XLSX.utils.json_to_sheet(processedData);
                const newWorkbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, 'Schedule');

                // Generate and download Excel
                XLSX.writeFile(newWorkbook, `Scheduled_${selectedFile.name}`);

                processBtn.innerHTML = 'Downloaded Successfully!';
                processBtn.style.background = '#10b981'; // Emerald 500

                setTimeout(() => {
                    processBtn.innerHTML = 'Process & Download';
                    processBtn.style.background = 'var(--primary)';
                    processBtn.disabled = false;
                    processBtn.style.opacity = '1';
                }, 3000);

            } catch (error) {
                console.error(error);
                alert('Error processing file. Check console for details.');
                processBtn.innerHTML = 'Process & Download';
                processBtn.disabled = false;
                processBtn.style.opacity = '1';
            }
        });

        trayProcessBtn.addEventListener('click', async () => {
            if (!traySelectedFile) return;
            trayProcessBtn.disabled = true;
            trayProcessBtn.innerHTML = '<span class="spinner"></span> Processing...';
            trayProcessBtn.style.opacity = '0.8';

            try {
                const data = await traySelectedFile.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                const traySheetName = workbook.SheetNames.find((name) => String(name).trim().toLowerCase() === 'tray');
                if (!traySheetName) {
                    throw new Error('Sheet named "tray" not found.');
                }
                const worksheet = workbook.Sheets[traySheetName];
                const rowsData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                const outputRows = processTrayCounter(rowsData);

                const outSheet = XLSX.utils.json_to_sheet(outputRows);
                const outBook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(outBook, outSheet, 'Tray Packing Import');
                XLSX.writeFile(outBook, 'TrayPackingImport_Template.xlsx');

                trayProcessBtn.innerHTML = 'Downloaded Successfully!';
                trayProcessBtn.style.background = '#10b981';
                setTimeout(() => {
                    trayProcessBtn.innerHTML = 'Generate Tray Counter Excel';
                    trayProcessBtn.style.background = 'var(--primary)';
                    trayProcessBtn.disabled = false;
                    trayProcessBtn.style.opacity = '1';
                }, 3000);
            } catch (error) {
                console.error(error);
                alert('Error processing tray counter file. Please check Product and Qty columns.');
                trayProcessBtn.innerHTML = 'Generate Tray Counter Excel';
                trayProcessBtn.disabled = false;
                trayProcessBtn.style.opacity = '1';
            }
        });

        function processSchedule(data) {
            const today = new Date();
            const nextDate = new Date(today.getFullYear(), today.getMonth(), today.getDate() + 1);
            const formattedDateStr = formatDateDMY(nextDate);

            const masterCurrentTimes = {};

            return data.map((row) => {
                // Find product and qty from row case-insensitively
                let product = '';
                let targetQty = 0;

                for (const k of Object.keys(row)) {
                    const lk = k.toLowerCase().trim();
                    if (lk === 'product' || lk === 'product name' || lk === 'item' || lk === 'item name') {
                        product = String(row[k]).trim();
                    } else if (lk === 'target qty' || lk === 'qty' || lk === 'quantity' || lk === 'target quantity') {
                        targetQty = Number(row[k]) || 0;
                    }
                }

                const master = getMasterNameForProduct(product);
                const avgTime = getAvgTimeForProduct(product);
                const totalMinutes = targetQty * avgTime;

                if (!masterCurrentTimes[master]) {
                    let startHour = 7; // Default 7:00 AM
                    let masterName = master ? master.toUpperCase().trim() : "";

                    if (masterName === "SRIDHAR" || masterName === "DHASARATHAN") {
                        startHour = 5;
                    } else if (masterName === "THIYAGARAJAN") {
                        startHour = 6;
                    } else if (masterName === "DEVAN") {
                        startHour = 8;
                    }
                    masterCurrentTimes[master] = new Date(nextDate.getFullYear(), nextDate.getMonth(), nextDate.getDate(), startHour, 0, 0, 0);
                }

                const startDateTime = new Date(masterCurrentTimes[master]);
                const endDateTime = new Date(startDateTime.getTime() + (totalMinutes * 60000));

                // Update start time for next iteration of this master
                masterCurrentTimes[master] = new Date(endDateTime);

                return {
                    'Entry Date': formattedDateStr,
                    'Master': master,
                    'Product': product,
                    'Start Date': formattedDateStr,
                    'Start Time': formatTimeHM(startDateTime),
                    'End Date': formattedDateStr,
                    'End Time': formatTimeHM(endDateTime),
                    'Target Qty': targetQty
                };
            });
        }

        function processTrayCounter(data) {
            const counts = new Map();
            const nextDate = getNextDateFromTrayData(data);

            data.forEach((row) => {
                const productRaw = Array.isArray(row) ? row[0] : undefined;
                const qtyRaw = Array.isArray(row) ? row[1] : undefined;
                const product = String(productRaw ?? '').trim();
                const qty = parseQty(qtyRaw);
                if (!product || !Number.isFinite(qty) || qty <= 0) return;

                const normalizedProduct = product.toUpperCase();
                if (!counts.has(normalizedProduct)) {
                    counts.set(normalizedProduct, { productName: product, qtyMap: new Map() });
                }
                const bucket = counts.get(normalizedProduct);
                const qtyKey = Number(qty.toFixed(3));
                bucket.qtyMap.set(qtyKey, (bucket.qtyMap.get(qtyKey) || 0) + 1);
            });

            const packStartText = formatDateWithTime(nextDate, 7, 0);
            const packEndText = formatDateWithTime(nextDate, 13, 0);
            const handoverText = formatDateWithTime(nextDate, 14, 0);
            const rows = [];

            counts.forEach((productBucket) => {
                productBucket.qtyMap.forEach((count, qtyValue) => {
                    rows.push({
                        'Master Name': getMasterNameForProduct(productBucket.productName),
                        'Product Name': productBucket.productName,
                        'Pack Start': packStartText,
                        'Pack End': packEndText,
                        'Tray Size (kg)': qtyValue,
                        'Tray Count': count,
                        'Pack (kg)': '',
                        'Handover DateTime': handoverText
                    });
                });
            });

            rows.sort((a, b) => {
                const productCompare = String(a['Product Name']).localeCompare(String(b['Product Name']));
                if (productCompare !== 0) return productCompare;
                return Number(a['Tray Size (kg)']) - Number(b['Tray Size (kg)']);
            });

            return rows;
        }

        function parseQty(value) {
            if (typeof value === 'number') return value;
            const cleaned = String(value ?? '')
                .trim()
                .replace(/,/g, '')
                .replace(/[^\d.\-]/g, '');
            if (!cleaned) return NaN;
            const n = Number(cleaned);
            return Number.isFinite(n) ? n : NaN;
        }

        function getValueByHeader(row, expectedHeaders) {
            const keys = Object.keys(row || {});
            const normalizedMap = new Map();
            keys.forEach((k) => normalizedMap.set(String(k).trim().toLowerCase(), row[k]));
            for (const header of expectedHeaders) {
                const v = normalizedMap.get(String(header).trim().toLowerCase());
                if (v !== undefined) return v;
            }
            return undefined;
        }

        function normalizeProductKey(value) {
            return String(value ?? '').trim().replace(/\s+/g, ' ').toUpperCase();
        }

        function getMasterNameForProduct(productName) {
            let key = normalizeProductKey(productName);
            if (productMasterMap[key] !== undefined) {
                return productMasterMap[key];
            }
            if (key.endsWith(' BP')) {
                const noBpKey = key.substring(0, key.length - 3).trim();
                if (productMasterMap[noBpKey] !== undefined) {
                    return productMasterMap[noBpKey];
                }
            }
            const withBpKey = key + ' BP';
            if (productMasterMap[withBpKey] !== undefined) {
                return productMasterMap[withBpKey];
            }
            return '';
        }

        function parseAvgTime(val) {
            const num = Number(val);
            if (isNaN(num)) return 0;
            if (num < 0) {
                try {
                    const date = new Date(num);
                    if (!isNaN(date.getTime())) {
                        return date.getHours() + (date.getMinutes() / 60) + (date.getSeconds() / 3600);
                    }
                } catch (e) {
                    console.error("Error parsing negative time:", e);
                }
            }
            return num;
        }

        function getAvgTimeForProduct(productName) {
            let key = normalizeProductKey(productName);
            let val = 0;
            if (productAvgTimes[key] !== undefined) {
                val = productAvgTimes[key];
            } else if (key.endsWith(' BP')) {
                const noBpKey = key.substring(0, key.length - 3).trim();
                if (productAvgTimes[noBpKey] !== undefined) {
                    val = productAvgTimes[noBpKey];
                }
            } else {
                const withBpKey = key + ' BP';
                if (productAvgTimes[withBpKey] !== undefined) {
                    val = productAvgTimes[withBpKey];
                }
            }
            return parseAvgTime(val);
        }

        function getNextDateFromTrayData(data) {
            for (const row of data) {
                const raw = Array.isArray(row) ? row[2] : undefined;
                const parsed = parseSheetDate(raw);
                if (parsed) {
                    const next = new Date(parsed.getFullYear(), parsed.getMonth(), parsed.getDate() + 1);
                    return next;
                }
            }
            const now = new Date();
            return new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        }

        function parseSheetDate(value) {
            if (value instanceof Date && !isNaN(value.getTime())) return value;
            if (typeof value === 'number' && Number.isFinite(value)) {
                const excelEpoch = new Date(Date.UTC(1899, 11, 30));
                const d = new Date(excelEpoch.getTime() + (value * 86400000));
                return isNaN(d.getTime()) ? null : d;
            }
            const s = String(value ?? '').trim();
            if (!s) return null;
            const d = new Date(s);
            return isNaN(d.getTime()) ? null : d;
        }

        function formatDateWithTime(date, hour, minute) {
            const d = new Date(date.getFullYear(), date.getMonth(), date.getDate(), hour, minute, 0, 0);
            const pad = (n) => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        function formatDateDMY(date) {
            const pad = (n) => String(n).padStart(2, '0');
            const DD = pad(date.getDate());
            const MM = pad(date.getMonth() + 1);
            const YYYY = date.getFullYear();
            return `${DD}-${MM}-${YYYY}`;
        }

        function formatTimeHM(date) {
            const pad = (n) => String(n).padStart(2, '0');
            return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        function parseTimeToMinutes(timeStr) {
            if (!timeStr) return 0;
            const parts = String(timeStr).split(':');
            const hh = parseInt(parts[0], 10) || 0;
            const mm = parseInt(parts[1], 10) || 0;
            return (hh * 60) + mm;
        }

        // Helper function for YYYY-MM-DD HH:mm:ss formatting
        function formatDateTime(date) {
            const pad = (n) => n.toString().padStart(2, '0');
            const YYYY = date.getFullYear();
            const MM = pad(date.getMonth() + 1);
            const DD = pad(date.getDate());

            let hh = date.getHours();
            let mm = pad(date.getMinutes());
            let ss = pad(date.getSeconds());

            // Format to 24 Hour standard which translates well into Excel
            return `${YYYY}-${MM}-${DD} ${pad(hh)}:${mm}:${ss}`;
        }
    </script>
