<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Production Dashboard</title>
  <!-- SheetJS for Excel processing -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label.field-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    input[type="text"],
    input[type="date"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      background: #fff;
      color: var(--text);
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="date"]:focus {
      border-color: var(--primary);
    }

    /* Styled Upload Area */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      background: #f8fafc;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .upload-area.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #f1f5f9;
      border-color: #cbd5e1;
    }

    .upload-area:not(.disabled):hover {
      border-color: var(--primary);
      background: #eff6ff;
    }

    .upload-icon {
      font-size: 1.8rem;
      color: var(--text-muted);
    }

    .upload-text {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .upload-text span {
      color: var(--primary);
      font-weight: 600;
    }

    .file-name-display {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--success);
      margin-top: 8px;
      word-break: break-all;
      display: none;
      text-align: center;
    }

    .btn {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 10px;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
    }

    .status-message {
      margin-top: 16px;
      padding: 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }

    .status-message.success {
      background: #dcfce7;
      color: #15803d;
      border: 1px solid #bbf7d0;
      display: block;
    }

    .status-message.error {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      display: block;
    }

    .status-message.info {
      background: #e0f2fe;
      color: #0369a1;
      border: 1px solid #bae6fd;
      display: block;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Production Dashboard</h1>
    <p class="subtitle">Upload Excel to generate Entry Sheets</p>

    <div class="form-group">
      <label class="field-label" for="issuedBy">Issued By</label>
      <input type="text" id="issuedBy" placeholder="Enter name...">
    </div>

    <div class="form-group">
      <label class="field-label" for="deliveryDate">Delivery Date</label>
      <input type="date" id="deliveryDate">
    </div>

    <div class="form-group">
      <label class="field-label">Upload Excel File</label>
      <label for="fileInput" class="upload-area disabled" id="uploadLabel">
        <div class="upload-icon">📁</div>
        <div class="upload-text" id="uploadText">API loading, please wait...</div>
        <input type="file" id="fileInput" accept=".xlsx, .xls" style="display: none;" disabled>
      </label>
      <div class="file-name-display" id="fileNameDisplay"></div>
    </div>

    <button id="processBtn" class="btn" disabled>Generate & Download Files</button>

    <div id="status" class="status-message"></div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycby-t__7U1IJMhRn19dOgAeZhbk7JXt99K22xFxaAXjBleNF-6-UxcCDwIhejZl9oesebA/exec';

    let apiData = [];
    let ignoredBoms = new Set();
    let correctedBoms = new Map();
    const issuedByInput = document.getElementById('issuedBy');
    const deliveryDateInput = document.getElementById('deliveryDate');
    const fileInput = document.getElementById('fileInput');
    const uploadLabel = document.getElementById('uploadLabel');
    const uploadText = document.getElementById('uploadText');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const processBtn = document.getElementById('processBtn');
    const statusDiv = document.getElementById('status');

    // Load Issued By from local storage
    function loadSavedIssuedBy() {
      const saved = localStorage.getItem('issuedBy');
      if (saved) {
        issuedByInput.value = saved;
      }
    }

    // Save Issued By to local storage
    issuedByInput.addEventListener('input', () => {
      localStorage.setItem('issuedBy', issuedByInput.value.trim());
    });

    // Set Default Date to Today
    function setDefaultDate() {
      const today = new Date();
      const yyyy = today.getFullYear();
      let mm = today.getMonth() + 1;
      let dd = today.getDate();
      if (mm < 10) mm = '0' + mm;
      if (dd < 10) dd = '0' + dd;
      deliveryDateInput.value = `${yyyy}-${mm}-${dd}`;
    }

    function showStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = `status-message ${type}`;
    }

    // Fetch master API data on load
    async function loadApiData() {
      showStatus('Loading master API data...', 'info');
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error('Failed to fetch from API');
        apiData = await response.json();

        // Enable file input & styled upload area
        fileInput.disabled = false;
        uploadLabel.classList.remove('disabled');
        uploadText.innerHTML = '<span>Click to upload</span> or drag & drop';

        showStatus('Master data synced successfully. Ready to process.', 'info');
        checkFormValidity();
      } catch (error) {
        console.error(error);
        showStatus('Error syncing master data. Check connection.', 'error');
      }
    }

    function checkFormValidity() {
      const hasIssuedBy = issuedByInput.value.trim() !== '';
      const hasDate = deliveryDateInput.value !== '';
      const hasFile = fileInput.files.length > 0;
      processBtn.disabled = !(hasIssuedBy && hasDate && hasFile && apiData.length > 0);
    }

    [issuedByInput, deliveryDateInput].forEach(el => el.addEventListener('input', checkFormValidity));

    fileInput.addEventListener('change', (e) => {
      ignoredBoms.clear();
      correctedBoms.clear();
      if (e.target.files.length > 0) {
        const name = e.target.files[0].name;
        fileNameDisplay.textContent = `Selected: ${name}`;
        fileNameDisplay.style.display = 'block';
      } else {
        fileNameDisplay.style.display = 'none';
      }
      checkFormValidity();
    });

    // Drag & Drop effects for Styled Upload Label
    uploadLabel.addEventListener('dragover', (e) => {
      if (fileInput.disabled) return;
      e.preventDefault();
      uploadLabel.style.borderColor = 'var(--primary)';
      uploadLabel.style.background = '#eff6ff';
    });

    uploadLabel.addEventListener('dragleave', () => {
      if (fileInput.disabled) return;
      uploadLabel.style.borderColor = '';
      uploadLabel.style.background = '';
    });

    uploadLabel.addEventListener('drop', (e) => {
      if (fileInput.disabled) return;
      e.preventDefault();
      uploadLabel.style.borderColor = '';
      uploadLabel.style.background = '';

      if (e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files;
        // Trigger change event programmatically
        fileInput.dispatchEvent(new Event('change'));
      }
    });

    function formatDateDMY(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length === 3) {
        return `${parts[2]}-${parts[1]}-${parts[0]}`; // yyyy-mm-dd -> dd-mm-yyyy
      }
      return dateStr;
    }

    function getTodayDateDMY() {
      const today = new Date();
      let dd = today.getDate();
      let mm = today.getMonth() + 1;
      const yyyy = today.getFullYear();
      if (dd < 10) dd = '0' + dd;
      if (mm < 10) mm = '0' + mm;
      return `${dd}-${mm}-${yyyy}`;
    }

    function getLevenshteinDistance(a, b) {
      const matrix = [];
      for (let i = 0; i <= b.length; i++) {
        matrix[i] = [i];
      }
      for (let j = 0; j <= a.length; j++) {
        matrix[0][j] = j;
      }
      for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
          if (b.charAt(i - 1) === a.charAt(j - 1)) {
            matrix[i][j] = matrix[i - 1][j - 1];
          } else {
            matrix[i][j] = Math.min(
              matrix[i - 1][j - 1] + 1, // substitution
              matrix[i][j - 1] + 1,     // insertion
              matrix[i - 1][j] + 1      // deletion
            );
          }
        }
      }
      return matrix[b.length][a.length];
    }

    processBtn.addEventListener('click', () => {
      const file = fileInput.files[0];
      if (!file) return;

      showStatus('Processing excel...', 'info');

      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });

          let targetSheetName = workbook.SheetNames.find(s => ['SKS'].includes(s.trim().toUpperCase()));
          if (!targetSheetName) {
            targetSheetName = workbook.SheetNames[0];
          }

          const worksheet = workbook.Sheets[targetSheetName];
          const sheetJson = XLSX.utils.sheet_to_json(worksheet);

          if (sheetJson.length === 0) {
            showStatus('The uploaded sheet is empty.', 'error');
            return;
          }

          // Parse columns (Excel now only has BOM and SET columns)
          const uploadedRows = sheetJson.map(row => {
            const keys = Object.keys(row);
            // Look for keys matching 'bom' and 'set' case-insensitively
            const bomKey = keys.find(k => k.toLowerCase() === 'bom');
            const setKey = keys.find(k => k.toLowerCase() === 'set');

            // Fallback to position if exact header names aren't matched
            const finalBomKey = bomKey || keys[0];
            const finalSetKey = setKey || keys[1];
            const rawBom = finalBomKey ? String(row[finalBomKey] || '').trim() : '';
            const correctedBom = correctedBoms.get(rawBom.toLowerCase()) || rawBom;
            return {
              bom: correctedBom,
              qty: finalSetKey ? Number(row[finalSetKey] || 0) : 0
            };
          }).filter(row => row.bom !== '');

          if (uploadedRows.length === 0) {
            showStatus('No rows with BOM & SET column found.', 'error');
            return;
          }

          // Validate BOM names against Master API list
          for (const row of uploadedRows) {
            const bomNameLower = row.bom.toLowerCase();
            if (ignoredBoms.has(bomNameLower)) {
              continue;
            }
            const match = apiData.find(item => item.Bom && item.Bom.trim().toLowerCase() === bomNameLower);
            if (!match) {
              showStatus(`BOM "${row.bom}" not found in master data.`, 'error');

              const container = document.createElement('div');
              container.style.marginTop = '8px';
              container.style.display = 'flex';
              container.style.flexDirection = 'column';
              container.style.gap = '6px';
              container.style.alignItems = 'center';

              // Find suggestions
              const suggestions = [];
              const queryClean = bomNameLower.replace(/\s+/g, '');
              for (const item of apiData) {
                if (!item.Bom) continue;
                const itemBom = item.Bom.trim();
                const itemBomLower = itemBom.toLowerCase();
                const itemClean = itemBomLower.replace(/\s+/g, '');

                if (queryClean === itemClean) {
                  suggestions.push({ bom: itemBom, dist: 0 });
                  continue;
                }
                const dist = getLevenshteinDistance(bomNameLower, itemBomLower);
                if (dist <= 3) {
                  suggestions.push({ bom: itemBom, dist: dist });
                }
              }
              suggestions.sort((a, b) => a.dist - b.dist);
              const uniqueSuggestions = Array.from(new Set(suggestions.map(s => s.bom))).slice(0, 3);

              if (uniqueSuggestions.length > 0) {
                const suggestionLabel = document.createElement('div');
                suggestionLabel.textContent = 'Did you mean:';
                suggestionLabel.style.fontSize = '0.85rem';
                suggestionLabel.style.fontWeight = 'bold';
                suggestionLabel.style.marginTop = '4px';
                container.appendChild(suggestionLabel);

                uniqueSuggestions.forEach(sug => {
                  const sugBtn = document.createElement('button');
                  sugBtn.textContent = sug;
                  sugBtn.style.padding = '4px 10px';
                  sugBtn.style.fontSize = '0.8rem';
                  sugBtn.style.cursor = 'pointer';
                  sugBtn.style.border = '1px solid #1e3a8a';
                  sugBtn.style.borderRadius = '4px';
                  sugBtn.style.background = '#eff6ff';
                  sugBtn.style.color = '#1e3a8a';
                  sugBtn.style.fontWeight = '500';
                  sugBtn.style.width = '100%';
                  sugBtn.style.maxWidth = '250px';

                  sugBtn.addEventListener('click', () => {
                    correctedBoms.set(bomNameLower, sug);
                    processBtn.click();
                  });
                  container.appendChild(sugBtn);
                });
              }

              const ignoreBtn = document.createElement('button');
              ignoreBtn.textContent = 'Ignore';
              ignoreBtn.style.padding = '4px 12px';
              ignoreBtn.style.fontSize = '0.8rem';
              ignoreBtn.style.cursor = 'pointer';
              ignoreBtn.style.border = '1px solid #b91c1c';
              ignoreBtn.style.borderRadius = '4px';
              ignoreBtn.style.background = '#fff';
              ignoreBtn.style.color = '#b91c1c';
              ignoreBtn.style.fontWeight = '600';
              ignoreBtn.style.marginTop = '6px';

              ignoreBtn.addEventListener('click', () => {
                ignoredBoms.add(bomNameLower);
                processBtn.click();
              });
              container.appendChild(ignoreBtn);

              statusDiv.appendChild(container);
              return;
            }
          }

          const issuedBy = issuedByInput.value.trim();
          const deliveryDateFormatted = formatDateDMY(deliveryDateInput.value);
          const todayDate = getTodayDateDMY();

          const setEntryData = [];
          const prodEntryData = [];

          const rowsToProcess = uploadedRows.filter(row => !ignoredBoms.has(row.bom.toLowerCase()));

          rowsToProcess.forEach(row => {
            // Compare to Master API Data (guaranteed to match here)
            const match = apiData.find(item => item.Bom && item.Bom.trim().toLowerCase() === row.bom.toLowerCase());
            const setName = match ? (match.Set || '') : '';

            // Set Entry Columns
            setEntryData.push({
              'Product Name': setName,
              'Quantity': row.qty,
              'Issued By': issuedBy,
              'Delivery Date': deliveryDateFormatted
            });

            prodEntryData.push({
              'Entry Date': todayDate,
              'Master': match ? (match.Master || '') : 'NOT FOUND',
              'Product': match ? (match.BP || '') : 'NOT FOUND',
              'Start Date': deliveryDateFormatted,
              'Start Time': match ? (match.StartTime || '') : '',
              'End Date': deliveryDateFormatted,
              'End Time': match ? (match.EndTime || '') : '',
              'Target Set': row.qty
            });
          });

          // Generate File 1: Set Entry
          const ws1 = XLSX.utils.json_to_sheet(setEntryData);
          const wb1 = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb1, ws1, "Set Entry");
          XLSX.writeFile(wb1, `${todayDate} Set Entry.xlsx`);

          // Generate File 2: Production Entry
          const ws2 = XLSX.utils.json_to_sheet(prodEntryData);
          const wb2 = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb2, ws2, "Production Entry");
          XLSX.writeFile(wb2, `${todayDate} Production Entry.xlsx`);

          showStatus('Files generated and downloaded successfully!', 'success');
        } catch (err) {
          console.error(err);
          showStatus('Failed to process Excel file.', 'error');
        }
      };

      reader.readAsArrayBuffer(file);
    });

    // Init
    loadSavedIssuedBy();
    setDefaultDate();
    loadApiData();
  </script>
</body>

</html>
